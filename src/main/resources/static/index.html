<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PDF → Word</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      width: 400px;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #333;
    }

    p {
      color: #666;
      font-size: 14px;
    }

    input[type="file"] {
      margin-top: 15px;
      width: 100%;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }

    .loader {
      margin: 15px auto 0;
      width: 32px;
      height: 32px;
      border: 4px solid #ddd;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div class="card">
  <h1>PDF → Word</h1>
  <p>Selecciona un PDF y conviértelo a Word</p>

  <input type="file" id="pdf" accept="application/pdf">

  <button onclick="convertir()">Convertir a Word</button>

  <div class="loader" id="loader"></div>
  <div class="status" id="status"></div>
</div>

<script>
function convertir() {
  const fileInput = document.getElementById("pdf");
  const status = document.getElementById("status");
  const loader = document.getElementById("loader");

  if (fileInput.files.length === 0) {
    status.innerText = "❌ Selecciona un PDF primero";
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  status.innerText = "Convirtiendo...";
  loader.style.display = "block";

  fetch("http://localhost:8080/word", {
    method: "POST",
    body: formData
  })
  .then(r => {
    if (!r.ok) throw new Error("Error en el servidor");
    return r.blob();
  })
  .then(blob => {
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "convertido.docx";
    document.body.appendChild(a);
    a.click();
    a.remove();

    status.innerText = "✔ Conversión completada";
  })
  .catch(err => {
    console.error(err);
    status.innerText = "❌ Error al convertir";
  })
  .finally(() => {
    loader.style.display = "none";
  });
}
</script>

</body>
</html>
